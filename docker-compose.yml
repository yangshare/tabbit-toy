services:
  tabbit2api:
    build: .
    container_name: tabbit2api
    restart: unless-stopped
    ports:
      - "${PORT:-8787}:8787"
    environment:
      - TABBIT_COOKIE=${TABBIT_COOKIE}
      - TABBIT_VERSION=${TABBIT_VERSION:-1.1.39(10101039)}
      - TABBIT_SIGN_KEY=${TABBIT_SIGN_KEY:-}
      - PORT=8787
      - API_KEY=${API_KEY:-}
      # 出站代理：访问 web.tabbit.ai 用（解决地域封锁 403）。留空则直连。
      # 形如 http://10.2.3.3:7897 或 https://user:pass@host:port
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
